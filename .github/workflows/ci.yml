name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -r sidecar/requirements.txt ruff mypy types-requests pytest
      - name: Lint (ruff)
        run: ruff check .
      # Two mypy passes: the sidecar script's module name shadows the Frappe app
      # package, so they can't be checked in one invocation (see pyproject.toml).
      - name: Typecheck sidecar
        run: python -m mypy sidecar/infinary_agent.py
      - name: Typecheck Frappe app
        run: python -m mypy infinary_agent/api.py
      - name: Tests
        run: python -m pytest tests -q
